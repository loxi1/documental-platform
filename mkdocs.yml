      - Documentos: 16-api/documentos.md
      - OCR: 16-api/ocr.md
      - Revisión Contable: 16-api/revision-contable.md
  - Operaciones:
      - Runbooks: 18-runbooks/README.md
      - Operations Manual: 29-operations-manual/README.md
      - Developer Onboarding: 30-developer-onboarding/README.md
  - Standards:
      - Índice: 21-standards/README.md
      - Backend: 21-standards/01-backend.md
