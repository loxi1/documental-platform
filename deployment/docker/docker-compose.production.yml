services:
  traefik:
    image: traefik:v3.1
    container_name: dp_traefik
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - dp_net

  nats:
    image: nats:2.10
    container_name: dp_nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    networks:
      - dp_net

  api-gateway:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.nest
      args:
        APP_PATH: apps/api-gateway
    container_name: dp_api_gateway
    restart: unless-stopped
    env_file:
      - ../env/.env.production
    environment:
      PORT: ${GATEWAY_PORT:-3000}
      SERVICE_NAME: api-gateway
      NATS_URL: nats://nats:4222
    expose:
      - "3000"
    depends_on:
      - nats
    networks:
      - dp_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dp-api.rule=Host(`${TRAEFIK_API_DOMAIN}`)"
      - "traefik.http.routers.dp-api.entrypoints=websecure"
      - "traefik.http.routers.dp-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.dp-api.loadbalancer.server.port=3000"

  web-admin:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.next
      args:
        APP_PATH: apps/web-admin
    container_name: dp_web_admin
    restart: unless-stopped
    env_file:
      - ../env/.env.production
    environment:
      PORT: 3005
    expose:
      - "3005"
    depends_on:
      - api-gateway
    networks:
      - dp_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dp-web.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.dp-web.entrypoints=websecure"
      - "traefik.http.routers.dp-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.dp-web.loadbalancer.server.port=3005"

  ms-auth:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.nest
      args:
        APP_PATH: apps/ms-auth
    container_name: dp_ms_auth
    restart: unless-stopped
    env_file:
      - ../env/.env.production
    environment:
      PORT: ${AUTH_PORT:-3001}
      SERVICE_NAME: ms-auth
      NATS_URL: nats://nats:4222
    expose:
      - "3001"
    depends_on:
      - nats
    networks:
      - dp_net

  ms-documentos:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.nest
      args:
        APP_PATH: apps/ms-documentos
    container_name: dp_ms_documentos
    restart: unless-stopped
    env_file:
      - ../env/.env.production
    environment:
      PORT: ${DOCUMENTOS_PORT:-3002}
      SERVICE_NAME: ms-documentos
      NATS_URL: nats://nats:4222
    expose:
      - "3002"
    depends_on:
      - nats
    networks:
      - dp_net

networks:
  dp_net:
    name: dp_net

volumes:
  traefik_letsencrypt:
